# Example LiteLLM proxy config — the multi-provider routing pattern.
#
# Run:  litellm --config litellm-config.example.yaml --port 4000
# Then point the framework at it:  MOX_LLM_BASE_URL=http://localhost:4000/v1
#
# The pattern: one proxy fronts a self-hosted open-weights brain AND any cloud
# fallbacks, so every agent routes through a single endpoint and you swap models
# without touching agent code. Secrets come from env — never hardcode keys here.

model_list:
  # Self-hosted open-weights brain (the default the cohort runs on).
  - model_name: gpt-oss-120b
    litellm_params:
      model: openai/gpt-oss-120b
      api_base: http://localhost:8080/v1      # your vLLM/llama.cpp server
      api_key: os.environ/LOCAL_LLM_KEY

  # Per-agent alias example — route a lane to a specific model.
  - model_name: agent/scout
    litellm_params:
      model: openai/gpt-oss-120b
      api_base: http://localhost:8080/v1
      api_key: os.environ/LOCAL_LLM_KEY

  # Optional cloud fallback (kept behind the same proxy; key from env).
  - model_name: cloud-fallback
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

litellm_settings:
  drop_params: true
  num_retries: 2
